<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Link Store — Estoque</title>
<meta name="theme-color" content="#FFFFFF" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
<link rel="icon" type="image/png" href="favicon-preta.png">
<link rel="icon" type="image/png" href="favicon-preta.png" media="(prefers-color-scheme: light)">
<link rel="icon" type="image/png" href="favicon-branca.png" media="(prefers-color-scheme: dark)">
<link rel="apple-touch-icon" href="favicon-preta.png">
<style>
  :root{
    --bg:#FFFFFF; --soft:#F5F5F7; --card:#FFFFFF;
    --ink:#1D1D1F; --muted:#6E6E73; --faint:#A1A1A6;
    --line:#E8E8ED; --line2:#D9D9DE;
    --accent:#0071E3; --novo:#1FA855; --semi:#C77A00;
    --shadow:0 1px 3px rgba(0,0,0,.05); --shadow-h:0 10px 34px rgba(0,0,0,.10);
  }
  @media (prefers-color-scheme:dark){
    :root{--bg:#000000;--soft:#1C1C1E;--card:#161618;--ink:#F5F5F7;--muted:#98989D;--faint:#5C5C61;--line:#242426;--line2:#38383B;--accent:#0A84FF;--novo:#32D74B;--semi:#FF9F0A;--shadow:0 1px 3px rgba(0,0,0,.5);--shadow-h:0 12px 40px rgba(0,0,0,.55)}
  }
  :root[data-theme="light"]{--bg:#FFFFFF;--soft:#F5F5F7;--card:#FFFFFF;--ink:#1D1D1F;--muted:#6E6E73;--faint:#A1A1A6;--line:#E8E8ED;--line2:#D9D9DE;--accent:#0071E3;--novo:#1FA855;--semi:#C77A00;--shadow:0 1px 3px rgba(0,0,0,.05);--shadow-h:0 10px 34px rgba(0,0,0,.10)}
  :root[data-theme="dark"]{--bg:#000000;--soft:#1C1C1E;--card:#161618;--ink:#F5F5F7;--muted:#98989D;--faint:#5C5C61;--line:#242426;--line2:#38383B;--accent:#0A84FF;--novo:#32D74B;--semi:#FF9F0A;--shadow:0 1px 3px rgba(0,0,0,.5);--shadow-h:0 12px 40px rgba(0,0,0,.55)}
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;line-height:1.45}
  .wrap{max-width:1060px;margin:0 auto;padding:0 20px 90px}

  header{text-align:center;padding:44px 0 24px}
  .logo{display:block;margin:0 auto;width:196px;max-width:58%;height:auto}
  .for-dark{display:none} .for-light{display:block}
  @media (prefers-color-scheme:dark){.for-light{display:none}.for-dark{display:block}}
  :root[data-theme="light"] .for-light{display:block}
  :root[data-theme="light"] .for-dark{display:none}
  :root[data-theme="dark"] .for-light{display:none}
  :root[data-theme="dark"] .for-dark{display:block}
  .tagline{margin-top:14px;font-size:15px;color:var(--muted);letter-spacing:-.01em}
  .meta{margin-top:14px;display:inline-flex;align-items:center;gap:9px;font-size:12.5px;color:var(--faint);background:var(--soft);border:1px solid var(--line);border-radius:999px;padding:7px 14px}
  .meta .g{width:6px;height:6px;border-radius:50%;background:var(--novo);box-shadow:0 0 0 3px color-mix(in srgb,var(--novo) 22%,transparent)}
  .meta b{color:var(--muted);font-weight:650}

  .bar{position:sticky;top:0;z-index:20;margin:8px -20px 0;padding:12px 20px;background:color-mix(in srgb,var(--bg) 82%,transparent);backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid var(--line)}
  .bar-in{display:flex;gap:10px;flex-wrap:wrap;align-items:center;max-width:1060px;margin:0 auto}
  .search{flex:1 1 220px;display:flex;align-items:center;gap:10px;background:var(--soft);border:1px solid var(--line);border-radius:999px;padding:0 16px;height:46px}
  .search svg{width:17px;height:17px;color:var(--faint);flex:none}
  .search input{border:0;outline:0;background:transparent;color:var(--ink);font-size:15.5px;width:100%;font-family:inherit}
  .search input::placeholder{color:var(--faint)}
  .chips{display:flex;gap:6px}
  .chip{font:inherit;font-size:14px;font-weight:560;cursor:pointer;height:46px;padding:0 17px;border-radius:999px;border:1px solid var(--line2);background:var(--card);color:var(--muted);display:flex;align-items:center;gap:7px;transition:.15s}
  .chip:hover{color:var(--ink)}
  .chip[aria-pressed="true"]{background:var(--ink);border-color:var(--ink);color:var(--bg)}
  .chip .n{font-size:12px;font-variant-numeric:tabular-nums;opacity:.55}
  .chip:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

  .sec{display:flex;align-items:center;gap:14px;margin:38px 4px 6px}
  .sec .t{font-size:21px;font-weight:730;letter-spacing:-.025em}
  .sec .rule{flex:1;height:1px;background:var(--line)}
  .sec .ct{font-size:13px;color:var(--faint);font-variant-numeric:tabular-nums;font-weight:560}

  .subcat{display:flex;align-items:center;gap:9px;margin:22px 3px 13px;font-size:14.5px;font-weight:680;color:var(--ink);letter-spacing:-.01em}
  .subcat .ci{width:27px;height:27px;border-radius:8px;background:var(--soft);display:grid;place-items:center;color:var(--muted);flex:none}
  .subcat .ci svg{width:15px;height:15px}
  .subcat .n{color:var(--faint);font-weight:500;font-size:12.5px}

  .secnote{margin:1px 4px 16px;font-size:13px;color:var(--muted);display:flex;align-items:center;gap:8px;flex-wrap:wrap;line-height:1.4}
  .secnote::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--novo);flex:none}
  .secnote.seminovo::before{background:var(--semi)}
  .secnote b{color:var(--ink);font-weight:660}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px 20px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:14px;transition:box-shadow .18s,transform .18s,border-color .18s}
  .card:hover{box-shadow:var(--shadow-h);transform:translateY(-2px);border-color:var(--line2)}
  .name{font-size:17px;font-weight:640;letter-spacing:-.02em;line-height:1.24;text-wrap:balance}
  .det{font-size:13px;color:var(--muted);margin-top:5px}
  .prices{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;border-top:1px solid var(--line);padding-top:14px}
  .pix .lbl{font-size:11px;font-weight:650;letter-spacing:.02em;color:var(--accent);text-transform:uppercase}
  .pix .v{font-size:26px;font-weight:750;letter-spacing:-.035em;font-variant-numeric:tabular-nums;margin-top:3px;line-height:1}
  .parc{text-align:right;font-variant-numeric:tabular-nums;display:flex;flex-direction:column;gap:4px}
  .parc .row{font-size:13.5px;color:var(--muted)}
  .parc .row b{color:var(--ink);font-weight:620}
  .parc .row .x{color:var(--faint);font-size:11px;font-weight:650;margin-right:3px}

  .empty{text-align:center;color:var(--muted);padding:70px 20px;font-size:16px}
  footer{margin-top:50px;padding-top:22px;border-top:1px solid var(--line);color:var(--faint);font-size:12.5px;text-align:center;line-height:1.9}

  @media (max-width:520px){
    .logo{width:168px;max-width:62%}
    .grid{grid-template-columns:1fr}
    .chips{width:100%}
    .chip{flex:1;justify-content:center;padding:0 8px}
    .sec .t{font-size:19px}
  }
</style>
</head>
