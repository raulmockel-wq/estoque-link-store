<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Link Store — Estoque</title>
<meta name="theme-color" content="#FFFFFF" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
<style>
  :root{
    --bg:#FFFFFF; --soft:#F5F5F7; --card:#FFFFFF;
    --ink:#1D1D1F; --muted:#6E6E73; --faint:#A1A1A6;
    --line:#E8E8ED; --line2:#D9D9DE;
    --accent:#0071E3; --novo:#1FA855; --semi:#C77A00;
    --shadow:0 1px 3px rgba(0,0,0,.05); --shadow-h:0 10px 34px rgba(0,0,0,.10);
    --badge-1:#48484A; --badge-2:#1D1D1F;
  }
  @media (prefers-color-scheme:dark){
    :root{
      --bg:#000000; --soft:#1C1C1E; --card:#161618; --ink:#F5F5F7; --muted:#98989D; --faint:#5C5C61;
      --line:#242426; --line2:#38383B; --accent:#0A84FF; --novo:#32D74B; --semi:#FF9F0A;
      --shadow:0 1px 3px rgba(0,0,0,.5); --shadow-h:0 12px 40px rgba(0,0,0,.55);
      --badge-1:#3A3A3C; --badge-2:#0A0A0B;
    }
  }
  :root[data-theme="light"]{--bg:#FFFFFF;--soft:#F5F5F7;--card:#FFFFFF;--ink:#1D1D1F;--muted:#6E6E73;--faint:#A1A1A6;--line:#E8E8ED;--line2:#D9D9DE;--accent:#0071E3;--novo:#1FA855;--semi:#C77A00;--shadow:0 1px 3px rgba(0,0,0,.05);--shadow-h:0 10px 34px rgba(0,0,0,.10);--badge-1:#48484A;--badge-2:#1D1D1F}
  :root[data-theme="dark"]{--bg:#000000;--soft:#1C1C1E;--card:#161618;--ink:#F5F5F7;--muted:#98989D;--faint:#5C5C61;--line:#242426;--line2:#38383B;--accent:#0A84FF;--novo:#32D74B;--semi:#FF9F0A;--shadow:0 1px 3px rgba(0,0,0,.5);--shadow-h:0 12px 40px rgba(0,0,0,.55);--badge-1:#3A3A3C;--badge-2:#0A0A0B}
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;line-height:1.45}
  .wrap{max-width:1060px;margin:0 auto;padding:0 20px 90px}

  header{text-align:center;padding:48px 0 26px}
  .logowrap{width:300px;max-width:80%;height:118px;margin:0 auto;overflow:hidden;display:flex;align-items:center;justify-content:center}
  .logo{width:100%;height:auto}
  .for-dark{display:none} .for-light{display:block}
  @media (prefers-color-scheme:dark){.for-light{display:none}.for-dark{display:block}}
  :root[data-theme="light"] .for-light{display:block}
  :root[data-theme="light"] .for-dark{display:none}
  :root[data-theme="dark"] .for-light{display:none}
  :root[data-theme="dark"] .for-dark{display:block}
  .tagline{margin-top:4px;font-size:15px;color:var(--muted);letter-spacing:-.01em}
  .meta{margin-top:16px;display:inline-flex;align-items:center;gap:9px;font-size:12.5px;color:var(--faint);background:var(--soft);border:1px solid var(--line);border-radius:999px;padding:7px 14px}
  .meta .g{width:6px;height:6px;border-radius:50%;background:var(--novo);box-shadow:0 0 0 3px color-mix(in srgb,var(--novo) 22%,transparent)}
  .meta b{color:var(--muted);font-weight:650}

  .bar{position:sticky;top:0;z-index:20;margin:8px -20px 0;padding:12px 20px;background:color-mix(in srgb,var(--bg) 82%,transparent);backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid var(--line)}
  .bar-in{display:flex;gap:10px;flex-wrap:wrap;align-items:center;max-width:1060px;margin:0 auto}
  .search{flex:1 1 220px;display:flex;align-items:center;gap:10px;background:var(--soft);border:1px solid var(--line);border-radius:999px;padding:0 16px;height:46px}
  .search svg{width:17px;height:17px;color:var(--faint);flex:none}
  .search input{border:0;outline:0;background:transparent;color:var(--ink);font-size:15.5px;width:100%;font-family:inherit}
  .search input::placeholder{color:var(--faint)}
  .chips{display:flex;gap:6px}
  .chip{font:inherit;font-size:14px;font-weight:560;cursor:pointer;height:46px;padding:0 17px;border-radius:999px;border:1px solid var(--line2);background:var(--card);color:var(--muted);display:flex;align-items:center;gap:7px;transition:.15s}
  .chip:hover{color:var(--ink)}
  .chip[aria-pressed="true"]{background:var(--ink);border-color:var(--ink);color:var(--bg)}
  .chip .n{font-size:12px;font-variant-numeric:tabular-nums;opacity:.55}
  .chip:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

  .sec{display:flex;align-items:center;gap:14px;margin:40px 4px 18px}
  .sec .t{font-size:20px;font-weight:700;letter-spacing:-.02em}
  .sec .rule{flex:1;height:1px;background:var(--line)}
  .sec .ct{font-size:13px;color:var(--faint);font-variant-numeric:tabular-nums;font-weight:560}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(304px,1fr));gap:15px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:20px 21px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:16px;transition:box-shadow .18s,transform .18s,border-color .18s}
  .card:hover{box-shadow:var(--shadow-h);transform:translateY(-3px);border-color:var(--line2)}
  .chead{display:flex;align-items:center;gap:9px}
  .cicon{width:30px;height:30px;border-radius:9px;background:var(--soft);display:grid;place-items:center;color:var(--muted);flex:none}
  .cicon svg{width:16px;height:16px}
  .cat{font-size:12px;font-weight:650;letter-spacing:.04em;color:var(--muted)}
  .state{margin-left:auto;font-size:11.5px;font-weight:650;color:var(--muted);display:flex;align-items:center;gap:6px}
  .state .sd{width:7px;height:7px;border-radius:50%}
  .state.novo .sd{background:var(--novo)} .state.semi .sd{background:var(--semi)}
  .name{font-size:18px;font-weight:640;letter-spacing:-.02em;line-height:1.22;text-wrap:balance}
  .det{font-size:13px;color:var(--muted);margin-top:6px}
  .prices{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;border-top:1px solid var(--line);padding-top:15px;margin-top:2px}
  .pix .lbl{font-size:11px;font-weight:650;letter-spacing:.02em;color:var(--accent);text-transform:uppercase}
  .pix .v{font-size:27px;font-weight:750;letter-spacing:-.035em;font-variant-numeric:tabular-nums;margin-top:3px;line-height:1}
  .parc{text-align:right;font-variant-numeric:tabular-nums;display:flex;flex-direction:column;gap:4px}
  .parc .row{font-size:13.5px;color:var(--muted)}
  .parc .row b{color:var(--ink);font-weight:620}
  .parc .row .x{color:var(--faint);font-size:11px;font-weight:650;margin-right:3px}

  .empty{text-align:center;color:var(--muted);padding:80px 20px;font-size:16px}
  footer{margin-top:50px;padding-top:22px;border-top:1px solid var(--line);color:var(--faint);font-size:12.5px;text-align:center;line-height:1.9}

  @media (max-width:520px){
    header{padding:40px 0 24px}
    .wordmark{font-size:27px}
    .grid{grid-template-columns:1fr}
    .chips{width:100%}
    .chip{flex:1;justify-content:center;padding:0 8px}
    .sec .t{font-size:18px}
  }
</style>
</head>

const IC={
  iPhone:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="7" y="2.5" width="10" height="19" rx="2.6"/><path d="M10.5 5.2h3" stroke-linecap="round"/></svg>',
  "Apple Watch":'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="6.5" y="6.5" width="11" height="11" rx="3"/><path d="M8.5 6.5l.6-3h5.8l.6 3M8.5 17.5l.6 3h5.8l.6-3" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  MacBook:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="4.5" y="5" width="15" height="10" rx="1.6"/><path d="M2.5 18.5h19" stroke-linecap="round"/></svg>',
  "Acessório":'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="2.4"/></svg>'
};
const brl=(v,dec)=>"R$ "+Number(v).toLocaleString("pt-BR",{minimumFractionDigits:dec?2:0,maximumFractionDigits:dec?2:0});
const x12=p=>(p*1.14)/12, x18=p=>(p*1.18)/18;
const norm=s=>s.toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"");
const categoria=m=>/iphone/i.test(m)?"iPhone":/watch/i.test(m)?"Apple Watch":/macbook/i.test(m)?"MacBook":"Acessório";
let filtro="todos", termo="";
const app=document.getElementById("app");
function card(it){
  const cls=it.e==="novo"?"novo":"semi", rot=it.e==="novo"?"Novo":"Seminovo", cat=categoria(it.m);
  return `<article class="card">
    <div>
      <div class="chead"><span class="cicon">${IC[cat]}</span><span class="cat">${cat}</span><span class="state ${cls}"><span class="sd"></span>${rot}</span></div>
      <div class="name">${it.m}</div>
      <div class="det">${it.d}</div>
    </div>
    <div class="prices">
      <div class="pix"><div class="lbl">PIX à vista</div><div class="v">${brl(it.pix,0)}</div></div>
      <div class="parc">
        <div class="row"><span class="x">12x</span><b>${brl(x12(it.pix),1)}</b></div>
        <div class="row"><span class="x">18x</span><b>${brl(x18(it.pix),1)}</b></div>
      </div>
    </div>
  </article>`;
}
function render(){
  const t=norm(termo.trim());
  const match=it=>(filtro==="todos"||it.e===filtro)&&(!t||norm(it.m+" "+it.d).includes(t));
  const nov=DADOS.filter(it=>it.e==="novo"&&match(it));
  const sem=DADOS.filter(it=>it.e==="seminovo"&&match(it));
  let h="";
  if(nov.length) h+=`<div class="sec"><span class="t">Novos</span><span class="rule"></span><span class="ct">${nov.length} lacrados</span></div><div class="grid">${nov.map(card).join("")}</div>`;
  if(sem.length) h+=`<div class="sec"><span class="t">Seminovos</span><span class="rule"></span><span class="ct">${sem.length} aparelhos</span></div><div class="grid">${sem.map(card).join("")}</div>`;
  if(!nov.length&&!sem.length) h=`<div class="empty">Nada encontrado pra "<b>${termo}</b>". Tenta outro modelo ou cor.</div>`;
  app.innerHTML=h;
}
document.getElementById("c-todos").textContent=DADOS.length;
document.getElementById("c-novo").textContent=DADOS.filter(d=>d.e==="novo").length;
document.getElementById("c-semi").textContent=DADOS.filter(d=>d.e==="seminovo").length;
document.getElementById("q").addEventListener("input",e=>{termo=e.target.value;render();});
document.querySelectorAll(".chip").forEach(c=>c.addEventListener("click",()=>{
  filtro=c.dataset.f;
  document.querySelectorAll(".chip").forEach(x=>x.setAttribute("aria-pressed",x===c?"true":"false"));
  render();
}));
render();
</script>
